<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Tarot Final Fix</title>
    <style>
        :root { --gold: #f1c40f; --night: #0a0a12; }
        body { background: #0a0a12; color: #eee; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); max-width: 400px; margin: 0 auto 20px; }
        input { width: 85%; background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; padding: 10px; text-align: center; outline: none; margin-bottom: 15px; font-size: 1rem; }
        button { background: var(--gold); color: black; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        .spread { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .card-box { width: 105px; text-align: center; }
        .label { font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        
        .card-inner { width: 105px; height: 175px; position: relative; transform-style: preserve-3d; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-inner.reversed { transform: rotateY(180deg) rotateZ(180deg); }
        
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 1px solid var(--gold); overflow: hidden; background: #1a1a2e; }
        .back { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--gold); }
        .front { transform: rotateY(180deg); background: #fff; }
        .front img { width: 100%; height: 100%; object-fit: cover; }
        
        #result { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 15px; text-align: left; display: none; line-height: 1.8; border-left: 5px solid var(--gold); max-width: 400px; margin: 20px auto; border: 1px solid rgba(241,196,15,0.2); }
        .loading { display: none; color: var(--gold); margin: 20px; font-style: italic; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold); letter-spacing: 2px;">TAROT INSIGHT PRO</h2>
    
    <div class="panel">
        <input type="text" id="q" placeholder="請輸入您的問題..." value="我今日的綜合運勢？">
        <br>
        <button id="btn" onclick="run()">抽取聖三角</button>
    </div>

    <div class="spread">
        <div class="card-box">
            <div class="label">過去</div>
            <div class="card-inner" id="c0">
                <div class="face back">✦</div>
                <div class="face front" id="f0"></div>
            </div>
        </div>
        <div class="card-box">
            <div class="label">現在</div>
            <div class="card-inner" id="c1">
                <div class="face back">✦</div>
                <div class="face front" id="f1"></div>
            </div>
        </div>
        <div class="card-box">
            <div class="label">未來</div>
            <div class="card-inner" id="c2">
                <div class="face back">✦</div>
                <div class="face front" id="f2"></div>
            </div>
        </div>
    </div>

    <div class="loading" id="loader">✨ 正在連結宇宙訊號與圖庫...</div>
    <div id="result"></div>

<script>
    const API_KEY = "AIzaSyCuzCXkCgNznA_BGVVo8TIaD7HnS1tkcMI";
    // 修正：針對您的報錯，改用 v1beta 並嘗試最穩定的完整路徑
    const ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

    // 圖片路徑轉換器：解決 Wiki 命名不統一問題
    function getCardImageUrl(card) {
        const name = card.name;
        // 將牌名轉換為 Wiki 標準格式，例如 "Four of Wands" -> "RWS_Tarot_04_Wands"
        // 這裡直接對接一個穩定的全牌組 CDN 作為備援
        const nameShort = card.name_short.toLowerCase();
        // 優先嘗試 TarotQA 的穩定圖片路徑
        return `https://tarotqa.com/img/tarot/${nameShort}.jpg`;
    }

    async function run() {
        const question = document.getElementById('q').value;
        const btn = document.getElementById('btn');
        const resBox = document.getElementById('result');
        const loader = document.getElementById('loader');

        if(!question) return alert("請輸入問題");
        btn.disabled = true;
        resBox.style.display = 'none';

        try {
            // 1. 抽取牌卡
            const tarotRes = await fetch("https://tarotapi.dev/api/v1/cards/random?n=3");
            const tarotData = await tarotRes.json();
            const cards = tarotData.cards;

            let spreadInfo = [];

            for(let i=0; i<3; i++) {
                const isRev = Math.random() > 0.5;
                const node = document.getElementById(`c${i}`);
                const face = document.getElementById(`f${i}`);
                
                // 設定圖片，並加上 onerror 備援機制
                const imgUrl = getCardImageUrl(cards[i]);
                face.innerHTML = `<img src="${imgUrl}" style="width:100%; height:100%; object-fit:cover;" onerror="this.parentElement.innerHTML='<div style=\'padding:20px; color:#222; font-weight:bold;\'>${cards[i].name}</div>'">`;
                
                node.classList.remove('flipped', 'reversed');
                setTimeout(() => {
                    node.classList.add(isRev ? 'reversed' : 'flipped');
                }, i * 300);

                spreadInfo.push(`${['過去','現在','未來'][i]}位：${cards[i].name}(${isRev?'逆位':'正位'})`);
            }

            // 2. AI 解讀
            loader.style.display = 'block';
            const aiRes = await fetch(ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: `你是一位專業塔羅大師。問題：${question}。牌陣：${spreadInfo.join('，')}。請給予一段約 200 字且溫暖有力量的解讀。` }] }] 
                })
            });

            const aiData = await aiRes.json();
            
            // 修正截圖中出現的 'undefined is not an object' 錯誤
            if (aiData.candidates && aiData.candidates[0]) {
                const reading = aiData.candidates[0].content.parts[0].text;
                resBox.innerHTML = `<b style="color:var(--gold)">🔮 大師解析：</b><br>${reading}`;
            } else {
                // 如果 API 返回錯誤，顯示具體原因
                const errMsg = aiData.error ? aiData.error.message : "API 暫時無法回應，請檢查 Key 權限。";
                throw new Error(errMsg);
            }
            
            resBox.style.display = 'block';

        } catch (err) {
            resBox.innerHTML = `<span style="color:#ff6b6b">異常：${err.message}</span>`;
            resBox.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
