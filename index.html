<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Tarot - Final Strike</title>
    <style>
        :root { --gold: #f1c40f; --night: #0a0a12; }
        body { background: var(--night); color: #eee; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); max-width: 420px; margin: 0 auto 20px; }
        input { width: 85%; background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; padding: 10px; text-align: center; outline: none; margin-bottom: 15px; font-size: 1.1rem; }
        button { background: var(--gold); color: black; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; color: #888; }

        .spread { display: flex; justify-content: center; gap: 8px; margin: 25px 0; }
        .card-box { width: 105px; text-align: center; }
        .label { font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        
        /* --- Flip-board Module --- */
        .card-inner { width: 105px; height: 175px; position: relative; transform-style: preserve-3d; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-inner.reversed { transform: rotateY(180deg) rotateZ(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 1.5px solid var(--gold); overflow: hidden; background: #1a1a2e; }
        .back { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--gold); }
        .front { transform: rotateY(180deg); background: #fff; }
        .front img { width: 100%; height: 100%; object-fit: cover; display: block; }
        /* ------------------------- */

        #result { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 15px; text-align: left; display: none; line-height: 1.8; border-left: 5px solid var(--gold); max-width: 420px; margin: 20px auto; border-top: 1px solid rgba(241,196,15,0.2); }
        .loading { display: none; color: var(--gold); margin: 20px; font-style: italic; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold); letter-spacing: 2px;">TAROT AI 聖三角</h2>
    
    <div class="panel">
        <input type="text" id="q" placeholder="請輸入您的問題..." value="我今日的綜合運勢？">
        <br>
        <button id="btn" onclick="runApp()">讀取天命</button>
    </div>

    <div class="spread">
        <div class="card-box"><div class="label">過去</div><div class="card-inner" id="c0"><div class="face back">✦</div><div class="face front"><img id="img0"></div></div></div>
        <div class="card-box"><div class="label">現在</div><div class="card-inner" id="c1"><div class="face back">✦</div><div class="face front"><img id="img1"></div></div></div>
        <div class="card-box"><div class="label">未來</div><div class="card-inner" id="c2"><div class="face back">✦</div><div class="face front"><img id="img2"></div></div></div>
    </div>

    <div class="loading" id="loader">✨ 正在與 Gemini 建立通靈連結...</div>
    <div id="result"></div>

<script>
    // ⚠ 請在此填入你新申請的 Key
    const API_KEY = "在此輸入新的_API_KEY"; 
    
    // 修正：使用 v1beta 搭配 gemini-1.5-flash，這是 Free Tier 最穩定的組合
    const API_BASE = "https://generativelanguage.googleapis.com/v1beta/models/";
    const MODEL_NAME = "gemini-1.5-flash"; 

    const UI = {
        btn: document.getElementById('btn'),
        res: document.getElementById('result'),
        loader: document.getElementById('loader'),
        q: document.getElementById('q')
    };

    async function runApp() {
        UI.btn.disabled = true;
        UI.res.style.display = 'none';
        
        try {
            // 1. 抽牌
            const tarotData = await fetch("https://tarotapi.dev/api/v1/cards/random?n=3").then(r => r.json());
            const cards = tarotData.cards;
            let log = [];

            for(let i=0; i<3; i++) {
                const isRev = Math.random() > 0.5;
                const card = cards[i];
                const cardID = card.name_short.toLowerCase();
                
                // 圖片映射：確保對接 tarotqa.com
                const imgNode = document.getElementById(`img${i}`);
                imgNode.src = `https://tarotqa.com/img/tarot/${cardID}.jpg`;
                
                // 翻牌動畫 (Flip-board Module 呼叫)
                const inner = document.getElementById(`c${i}`);
                inner.classList.remove('flipped', 'reversed');
                setTimeout(() => {
                    inner.classList.add(isRev ? 'reversed' : 'flipped');
                }, i * 300);

                log.push(`${['過去','現在','未來'][i]}位：${card.name}(${isRev?'逆位':'正位'})`);
            }

            // 2. AI 解析 (加上強大的 Error Handling)
            UI.loader.style.display = 'block';
            
            const response = await fetch(`${API_BASE}${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `你是一位大師。問題：${UI.q.value}。牌陣：${log.join('，')}。請給予一段 150 字溫暖解讀。` }] }] })
            });

            const aiData = await response.json();

            if (aiData.error) {
                // 如果 1.5-flash 報錯，這會告訴我們具體原因
                throw new Error(`Google API 報錯: ${aiData.error.message}`);
            }

            if (aiData.candidates && aiData.candidates[0]) {
                const text = aiData.candidates[0].content.parts[0].text;
                UI.res.innerHTML = `<b style="color:var(--gold)">🔮 大師解析：</b><br>${text}`;
            } else {
                throw new Error("API 未能產生內容，請確認您的 Key 是否具備 Gemini 存取權限。");
            }

            UI.res.style.display = 'block';

        } catch (err) {
            UI.res.innerHTML = `<span style="color:#ff6b6b">❌ 執行失敗：</span><br><small>${err.message}</small><br><br><b>建議檢查：</b><br>1. 您的 IP 是否在 Google AI 支援的區域？<br>2. 是否已在 Google Cloud 中啟用 "Generative Language API"？`;
            UI.res.style.display = 'block';
        } finally {
            UI.loader.style.display = 'none';
            UI.btn.disabled = false;
        }
    }
</script>
</body>
</html>
