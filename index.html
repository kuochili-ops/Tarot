<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Pro - Fixed</title>
    <style>
        :root { --gold: #f1c40f; --night: #0a0a12; }
        body { background: #0a0a12; color: #eee; font-family: sans-serif; text-align: center; padding: 20px; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); max-width: 400px; margin: 0 auto 20px; }
        input { width: 85%; background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; padding: 10px; text-align: center; outline: none; margin-bottom: 15px; font-size: 1.1rem; }
        button { background: var(--gold); color: black; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        .spread { display: flex; justify-content: center; gap: 8px; margin: 25px 0; }
        .card-box { width: 105px; text-align: center; }
        .label { font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        
        .card-inner { width: 105px; height: 175px; position: relative; transform-style: preserve-3d; transition: 0.8s; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-inner.reversed { transform: rotateY(180deg) rotateZ(180deg); }
        
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 1.5px solid var(--gold); overflow: hidden; background: #1a1a2e; }
        .back { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--gold); }
        .front { transform: rotateY(180deg); background: #fff; }
        .front img { width: 100%; height: 100%; object-fit: cover; }
        
        #result { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 15px; text-align: left; display: none; line-height: 1.8; border-left: 5px solid var(--gold); max-width: 400px; margin: 20px auto; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold)">聖三角塔羅 (三張全圖版)</h2>
    
    <div class="panel">
        <input type="text" id="q" placeholder="想問什麼？" value="我今日的綜合運勢？">
        <br>
        <button id="btn" onclick="run()">抽取啟示</button>
    </div>

    <div class="spread">
        <div class="card-box"><div class="label">過去</div><div class="card-inner" id="c0"><div class="face back">✦</div><div class="face front"><img id="img0"></div></div></div>
        <div class="card-box"><div class="label">現在</div><div class="card-inner" id="c1"><div class="face back">✦</div><div class="face front"><img id="img1"></div></div></div>
        <div class="card-box"><div class="label">未來</div><div class="card-inner" id="c2"><div class="face back">✦</div><div class="face front"><img id="img2"></div></div></div>
    </div>

    <div id="result"></div>

<script>
    // 1. 務必更換為新產生的 Key！
    const API_KEY = "在此貼入你的新_API_KEY"; 
    // 2. 修正模型名稱為 gemini-1.5-flash
    const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    async function run() {
        const resBox = document.getElementById('result');
        const btn = document.getElementById('btn');
        btn.disabled = true;

        try {
            // 抽牌
            const tarotRes = await fetch("https://tarotapi.dev/api/v1/cards/random?n=3");
            const data = await tarotRes.json();
            const cards = data.cards;

            let info = [];
            for(let i=0; i<3; i++) {
                const isRev = Math.random() > 0.5;
                const node = document.getElementById(`c${i}`);
                const img = document.getElementById(`img${i}`);
                
                // 圖片來源對接 TarotQA
                img.src = `https://tarotqa.com/img/tarot/${cards[i].name_short.toLowerCase()}.jpg`;
                
                node.className = 'card-inner';
                setTimeout(() => { node.classList.add(isRev ? 'reversed' : 'flipped'); }, i * 300);
                info.push(`${cards[i].name}(${isRev?'逆位':'正位'})`);
            }

            // AI 解讀
            const aiRes = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `你是大師。問題：${document.getElementById('q').value}。牌陣：${info.join(',')}。請給予 150 字解讀。` }] }] })
            });

            const aiData = await aiRes.json();
            if(aiData.candidates) {
                resBox.innerHTML = `🔮 <b>大師解析：</b><br>${aiData.candidates[0].content.parts[0].text}`;
                resBox.style.display = 'block';
            } else {
                throw new Error(aiData.error ? aiData.error.message : "API Key 異常");
            }
        } catch (err) {
            resBox.innerHTML = `<span style="color:red">錯誤：${err.message}</span>`;
            resBox.style.display = 'block';
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
