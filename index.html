<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Tarot - Full Imagery</title>
    <style>
        :root { --gold: #f1c40f; --night: #0a0a12; }
        body { background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%); color: #eee; font-family: -apple-system, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); max-width: 400px; margin: 0 auto 20px; backdrop-filter: blur(10px); }
        input { width: 85%; background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; padding: 10px; text-align: center; outline: none; margin-bottom: 15px; font-size: 1rem; }
        button { background: var(--gold); color: black; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(241,196,15,0.3); }

        /* 牌陣版面 */
        .spread { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .card-box { width: 105px; text-align: center; }
        .label { font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-weight: bold; text-shadow: 0 0 5px #000; }
        
        /* 翻牌模組 */
        .card-inner { width: 105px; height: 175px; position: relative; transform-style: preserve-3d; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-inner.reversed { transform: rotateY(180deg) rotateZ(180deg); }
        
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 1px solid var(--gold); overflow: hidden; background: #000; }
        .back { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .front { transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; }
        .front img { width: 100%; height: 100%; object-fit: cover; }
        
        #result { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; text-align: left; display: none; line-height: 1.8; border-left: 5px solid var(--gold); max-width: 400px; margin: 20px auto; border: 1px solid rgba(241,196,15,0.2); }
        .loading { display: none; color: var(--gold); margin: 20px; font-style: italic; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold); letter-spacing: 2px;">TAROT INSIGHT PRO</h2>
    
    <div class="panel">
        <input type="text" id="q" placeholder="請輸入您的問題..." value="我今日的綜合運勢？">
        <br>
        <button id="btn" onclick="run()">抽取牌卡</button>
    </div>

    <div class="spread">
        <div class="card-box"><div class="label">過去</div><div class="card-inner" id="c0"><div class="face back">✦</div><div class="face front"><img id="img0"></div></div></div>
        <div class="card-box"><div class="label">現在</div><div class="card-inner" id="c1"><div class="face back">✦</div><div class="face front"><img id="img1"></div></div></div>
        <div class="card-box"><div class="label">未來</div><div class="card-inner" id="c2"><div class="face back">✦</div><div class="face front"><img id="img2"></div></div></div>
    </div>

    <div class="loading" id="loader">✨ 正在讀取星象與牌面圖庫...</div>
    <div id="result"></div>

<script>
    const API_KEY = "AIzaSyCuzCXkCgNznA_BGVVo8TIaD7HnS1tkcMI";
    const ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

    // 格式化卡片名稱以匹配圖庫網址
    function formatCardUrl(card) {
        // 優先嘗試 TarotQA 的網址結構
        const nameShort = card.name_short.toLowerCase(); // 例如: ar06, cu05
        return `https://tarotqa.com/img/tarot/${nameShort}.jpg`;
    }

    async function run() {
        const question = document.getElementById('q').value;
        const btn = document.getElementById('btn');
        const resBox = document.getElementById('result');
        const loader = document.getElementById('loader');

        if(!question) return alert("請輸入問題");
        btn.disabled = true;
        resBox.style.display = 'none';

        try {
            // 1. 取得隨機牌卡
            const tarotRes = await fetch("https://tarotapi.dev/api/v1/cards/random?n=3");
            const tarotData = await tarotRes.json();
            const cards = tarotData.cards;

            let spreadInfo = [];

            for(let i=0; i<3; i++) {
                const isRev = Math.random() > 0.5;
                const node = document.getElementById(`c${i}`);
                const img = document.getElementById(`img${i}`);
                
                // 設定圖片與失敗備援
                img.src = formatCardUrl(cards[i]);
                img.onerror = function() {
                    // 如果第一來源失敗，嘗試 Wiki 備援路徑
                    this.src = `https://placehold.co/100x170/1a1a2e/gold?text=${cards[i].name.replace(' ','+')}`;
                };
                
                node.classList.remove('flipped', 'reversed');
                setTimeout(() => {
                    node.classList.add(isRev ? 'reversed' : 'flipped');
                }, i * 300);

                spreadInfo.push(`${['過去','現在','未來'][i]}位：${cards[i].name}(${isRev?'逆位':'正位'})`);
            }

            // 2. 請求 AI
            loader.style.display = 'block';
            const response = await fetch(ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `你是一位專業塔羅老師。問題：${question}。牌陣：${spreadInfo.join('，')}。請給予一段約 200 字解讀。` }] }]
                })
            });

            const aiData = await response.json();
            
            // 安全檢查：確保 candidates[0] 存在
            if (aiData.candidates && aiData.candidates.length > 0) {
                const reading = aiData.candidates[0].content.parts[0].text;
                resBox.innerHTML = `<b style="color:var(--gold)">🔮 大師解析：</b><br>${reading}`;
                resBox.style.display = 'block';
            } else {
                throw new Error(aiData.error ? aiData.error.message : "API 未能正確回傳內容");
            }

        } catch (err) {
            resBox.innerHTML = `<span style="color:#ff6b6b">異常：${err.message}</span><br><small>請確認 API Key 權限與網路環境。</small>`;
            resBox.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
