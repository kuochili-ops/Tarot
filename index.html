<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Insight - 互動占卜</title>
    <style>
        :root { --gold: #f1c40f; --night: #0a0a12; --card-w: 95px; --card-h: 155px; }
        body { background: var(--night); color: #eee; font-family: 'PingFang TC', sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .panel { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid var(--gold); max-width: 420px; margin: 0 auto 30px; }
        input { width: 85%; background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; padding: 12px; text-align: center; outline: none; margin-bottom: 20px; font-size: 1.1rem; }
        
        button { background: linear-gradient(135deg, var(--gold), #d4af37); color: black; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(241,196,15,0.3); }
        button:disabled { background: #444; color: #888; transform: none; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }

        /* 牌陣與註解 */
        .spread { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .card-box { width: var(--card-w); }
        .label { font-size: 0.75rem; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        .card-info { font-size: 0.8rem; margin-top: 10px; color: #fff; min-height: 3em; line-height: 1.4; }
        
        /* 翻牌模組 */
        .tarot-inner { width: var(--card-w); height: var(--card-h); position: relative; transform-style: preserve-3d; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tarot-inner.flipped { transform: rotateY(180deg); }
        .tarot-inner.reversed { transform: rotateY(180deg) rotateZ(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 1.5px solid var(--gold); overflow: hidden; }
        .back { display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--gold); background: #1a1a2e; }
        .front { transform: rotateY(180deg); background: #222; }
        .front img { width: 100%; height: 100%; object-fit: cover; }

        #result { background: rgba(255,255,255,0.08); padding: 25px; border-radius: 15px; text-align: left; display: none; line-height: 1.8; border-left: 6px solid var(--gold); max-width: 420px; margin: 20px auto; animation: fadeIn 0.5s; }
        .action-area { margin-top: 20px; text-align: center; border-top: 1px solid rgba(241,196,15,0.2); padding-top: 15px; }
        .loading { display: none; color: var(--gold); margin: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h2 style="color:var(--gold)">🔮 聖三角塔羅：互動占卜</h2>
    
    <div class="panel">
        <input type="text" id="q" placeholder="請輸入您的問題..." value="我今日的綜合運勢？">
        <br>
        <button id="btn-main" onclick="app.run()">開始占卜</button>
    </div>

    <div class="spread">
        <div class="card-box">
            <div class="label">過去</div>
            <div class="tarot-inner" id="c0"><div class="face back">✦</div><div class="face front"><img id="img0"></div></div>
            <div class="card-info" id="info0"></div>
        </div>
        <div class="card-box">
            <div class="label">現在</div>
            <div class="tarot-inner" id="c1"><div class="face back">✦</div><div class="face front"><img id="img1"></div></div>
            <div class="card-info" id="info1"></div>
        </div>
        <div class="card-box">
            <div class="label">未來</div>
            <div class="tarot-inner" id="c2"><div class="face back">✦</div><div class="face front"><img id="img2"></div></div>
            <div class="card-info" id="info2"></div>
        </div>
    </div>

    <div id="loader" class="loading">✨ 正在連結宇宙訊息...</div>
    <div id="result"></div>

<script>
const TAROT_MAP = {
    "ar00": "愚者", "ar01": "魔術師", "ar02": "女祭司", "ar03": "皇后", "ar04": "皇帝",
    "ar05": "教皇", "ar06": "戀人", "ar07": "戰車", "ar08": "力量", "ar09": "隱士",
    "ar10": "命運之輪", "ar11": "正義", "ar12": "吊人", "ar13": "死神", "ar14": "節制",
    "ar15": "惡魔", "ar16": "高塔", "ar17": "星星", "ar18": "月亮", "ar19": "太陽",
    "ar20": "審判", "ar21": "世界"
};

const app = {
    TOKEN: "Gsk_6C6cnnjdB7HnyS3T2KdRWGdyb3FYJVhfKFZtetj99lZioQH5j4fe",
    history: [],

    UI: {
        flip: (i, isRev, name) => {
            const el = document.getElementById(`c${i}`);
            el.className = 'tarot-inner'; 
            void el.offsetWidth;
            el.classList.add(isRev ? 'reversed' : 'flipped');
            document.getElementById(`info${i}`).innerHTML = `${name}<br><small style="color:${isRev?'#ff6b6b':'#4cd137'}">${isRev?'(逆位)':'(正位)'}</small>`;
        },
        reset: () => {
            for(let i=0; i<3; i++) {
                document.getElementById(`c${i}`).className = 'tarot-inner';
                document.getElementById(`info${i}`).innerHTML = '';
            }
            document.getElementById('result').style.display = 'none';
            document.getElementById('q').value = '';
            app.history = [];
        }
    },

    run: async function(isFollowUp = false) {
        const qInput = document.getElementById('q');
        const btn = document.getElementById('btn-main');
        const resBox = document.getElementById('result');
        const loader = document.getElementById('loader');
        
        if(!qInput.value) return alert("請輸入問題");
        
        btn.disabled = true;
        loader.style.display = 'block';
        if(!isFollowUp) this.UI.reset();

        try {
            let cardNames = [];
            // 如果是新占卜，則抽牌
            if(!isFollowUp) {
                const tarotRes = await fetch("https://tarotapi.dev/api/v1/cards/random?n=3");
                const data = await tarotRes.json();
                for(let i=0; i<3; i++) {
                    const card = data.cards[i];
                    const isRev = Math.random() > 0.5;
                    const cnName = TAROT_MAP[card.name_short] || card.name;
                    document.getElementById(`img${i}`).src = `https://www.sacred-texts.com/tarot/pkt/img/${card.name_short.toLowerCase()}.jpg`;
                    this.UI.flip(i, isRev, cnName);
                    cardNames.push(`${cnName}(${isRev?'逆位':'正位'})`);
                }
                this.history.push({ role: "user", content: `問題：${qInput.value}。牌陣：過去${cardNames[0]}、現在${cardNames[1]}、未來${cardNames[2]}。` });
            } else {
                this.history.push({ role: "user", content: qInput.value });
            }

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${this.TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "你是一位精通塔羅的資深占卜師。請用繁體中文提供充滿啟發性的解讀。如果使用者追問，請延續之前的對話給予建議。" },
                        ...this.history
                    ]
                })
            });

            const aiData = await response.json();
            const speech = aiData.choices[0].message.content;
            this.history.push({ role: "assistant", content: speech });

            resBox.innerHTML = `
                <div style="margin-bottom:15px;">${speech.replace(/\n/g, '<br>')}</div>
                <div class="action-area">
                    <button class="btn-outline" onclick="document.getElementById('q').focus(); document.getElementById('q').placeholder='請輸入追問內容...';">我想追問</button>
                    <button onclick="app.run(true)">送出追問</button>
                    <button class="btn-outline" onclick="app.UI.reset()">結束並關閉</button>
                </div>
            `;
            resBox.style.display = 'block';
            resBox.scrollIntoView({ behavior: 'smooth' });

        } catch (err) {
            alert("宇宙斷訊，請檢查網路或稍後再試。");
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }
};
</script>
</body>
</html>
