<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 聖三角塔羅</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0a0a12; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 80%; background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; padding: 10px; font-size: 1rem; outline: none; margin-bottom: 15px; }
        button { background: var(--gold); color: black; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }

        /* 牌陣設計 - 解決問號圖標問題 */
        .spread { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .card-container { width: 100px; }
        .label { font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        
        .card { 
            width: 100px; height: 160px; position: relative; transform-style: preserve-3d; transition: 0.8s;
            border-radius: 10px; border: 1px solid var(--gold);
        }
        .card.flipped { transform: rotateY(180deg); }
        .card.reversed { transform: rotateY(180deg) rotateZ(180deg); }
        
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; padding: 5px; box-sizing: border-box; text-align: center; }
        .back { background: #1a1a2e; color: var(--gold); font-size: 2rem; }
        .front { transform: rotateY(180deg); background: #fdfdfd; color: #222; flex-direction: column; }
        
        #result-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: left; display: none; line-height: 1.7; border-left: 4px solid var(--gold); }
        .loading { display: none; color: var(--gold); margin: 15px; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold)">聖三角占卜 Pro</h2>
    
    <div class="panel">
        <input type="text" id="question" placeholder="輸入您的問題..." value="我今日的運勢？">
        <br>
        <button id="drawBtn" onclick="startReading()">抽取聖三角</button>
    </div>

    <div class="spread">
        <div class="card-container"><div class="label">過去</div><div class="card" id="c0"><div class="face back">✦</div><div class="face front" id="f0"></div></div></div>
        <div class="card-container"><div class="label">現在</div><div class="card" id="c1"><div class="face back">✦</div><div class="face front" id="f1"></div></div></div>
        <div class="card-container"><div class="label">未來</div><div class="card" id="c2"><div class="face back">✦</div><div class="face front" id="f2"></div></div></div>
    </div>

    <div class="loading" id="loader">正在讀取星象...</div>
    <div id="result-box"></div>

<script>
    // 使用您最後提供的正確 API Key
    const API_KEY = "AIzaSyCuzCXkCgNznA_BGVVo8TIaD7HnS1tkcMI";
    // 修正後的精確路徑：v1beta + gemini-1.5-flash
    const ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    async function startReading() {
        const q = document.getElementById('question').value;
        const btn = document.getElementById('drawBtn');
        const resBox = document.getElementById('result-box');
        const loader = document.getElementById('loader');

        if (!q) return alert("請輸入問題");
        btn.disabled = true;
        resBox.style.display = 'none';
        
        try {
            // 1. 抽牌
            const res = await fetch("https://tarotapi.dev/api/v1/cards/random?n=3");
            const data = await res.json();
            const cards = data.cards;

            let cardNames = [];

            for(let i=0; i<3; i++) {
                const isRev = Math.random() > 0.5;
                const cardNode = document.getElementById(`c${i}`);
                const faceNode = document.getElementById(`f${i}`);
                
                // 使用文字 UI 取代圖片，確保 100% 顯示成功
                faceNode.innerHTML = `<b>${cards[i].name}</b><br><small style="color:${isRev?'red':'green'}">${isRev?'(逆位)':'(正位)'}</small>`;
                
                cardNode.classList.remove('flipped', 'reversed');
                setTimeout(() => {
                    cardNode.classList.add(isRev ? 'reversed' : 'flipped');
                }, i * 300);

                cardNames.push(`${['過去','現在','未來'][i]}位：${cards[i].name}(${isRev?'逆位':'正位'})`);
            }

            // 2. AI 解說
            loader.style.display = 'block';
            const reading = await getAIReading(q, cardNames.join("，"));
            
            resBox.innerHTML = `<h4 style="color:var(--gold);margin-top:0">啟示錄：</h4>${reading}`;
            resBox.style.display = 'block';

        } catch (err) {
            resBox.innerHTML = `<span style="color:#ff6b6b">異常：${err.message}</span><br>請確認 API Key 權限或網路。`;
            resBox.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }

    async function getAIReading(q, cardStr) {
        const response = await fetch(ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `你是一位專業塔羅占卜師。問題：${q}。牌陣：${cardStr}。請給予一段 200 字左右溫暖且有深度的建議。` }] }]
            })
        });

        const json = await response.json();
        if (json.error) throw new Error(json.error.message);
        return json.candidates[0].content.parts[0].text;
    }
</script>
</body>
</html>
