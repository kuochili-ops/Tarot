<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Insight v5.0</title>
    <style>
        :root { --gold: #f1c40f; --night: #0a0a12; }
        body { background: var(--night); color: #eee; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); max-width: 420px; margin: 0 auto 20px; }
        input { width: 85%; background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; padding: 10px; text-align: center; outline: none; margin-bottom: 15px; font-size: 1.1rem; }
        button { background: var(--gold); color: black; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; color: #888; }

        /* 翻牌模組 (Flip-board Module) */
        .spread { display: flex; justify-content: center; gap: 8px; margin: 25px 0; }
        .card-box { width: 105px; text-align: center; }
        .label { font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        .tarot-inner { width: 105px; height: 175px; position: relative; transform-style: preserve-3d; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .tarot-inner.flipped { transform: rotateY(180deg); }
        .tarot-inner.reversed { transform: rotateY(180deg) rotateZ(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 1.5px solid var(--gold); overflow: hidden; background: #1a1a2e; }
        .back { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--gold); }
        .front { transform: rotateY(180deg); background: #fff; }
        .front img { width: 100%; height: 100%; object-fit: cover; display: block; }

        #result { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 15px; text-align: left; display: none; line-height: 1.8; border-left: 5px solid var(--gold); max-width: 420px; margin: 20px auto; }
        .loading { display: none; color: var(--gold); margin: 20px; font-style: italic; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold)">聖三角塔羅 (修復版)</h2>
    
    <div class="panel">
        <input type="text" id="q" placeholder="你想問什麼？" value="我今日的綜合運勢？">
        <br>
        <button id="btn" onclick="app.run()">開始占卜</button>
    </div>

    <div class="spread">
        <div class="card-box"><div class="label">過去</div><div class="tarot-inner" id="c0"><div class="face back">✦</div><div class="face front"><img id="img0"></div></div></div>
        <div class="card-box"><div class="label">現在</div><div class="tarot-inner" id="c1"><div class="face back">✦</div><div class="face front"><img id="img1"></div></div></div>
        <div class="card-box"><div class="label">未來</div><div class="tarot-inner" id="c2"><div class="face back">✦</div><div class="face front"><img id="img2"></div></div></div>
    </div>

    <div class="loading" id="loader">✨ 正在讀取宇宙訊號...</div>
    <div id="result"></div>

<script>
const app = {
    // ⚠ 請確認填入正確的 Hugging Face Token (以 hf_ 開頭)
    TOKEN: "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",
    MODEL: "meta-llama/Llama-3.2-1B-Instruct",

    // 翻牌模組化邏輯
    UI: {
        flip: (i, isRev) => {
            const el = document.getElementById(`c${i}`);
            el.className = 'tarot-inner';
            void el.offsetWidth;
            el.classList.add(isRev ? 'reversed' : 'flipped');
        },
        reset: () => {
            for(let i=0; i<3; i++) document.getElementById(`c${i}`).className = 'tarot-inner';
        }
    },

    // 修復圖片來源：使用維基百科圖源 (最穩定)
    getWikiImg: (name) => {
        const mapping = {
            'ar00': 'The_Fool', 'ar01': 'The_Magician', 'ar02': 'The_High_Priestess', 
            'ar03': 'The_Empress', 'ar04': 'The_Emperor', 'ar05': 'The_Hierophant',
            'ar06': 'The_Lovers', 'ar07': 'The_Chariot', 'ar08': 'Strength', 
            'ar09': 'The_Hermit', 'ar10': 'Wheel_of_Fortune', 'ar11': 'Justice',
            'ar12': 'The_Hanged_Man', 'ar13': 'Death', 'ar14': 'Temperance', 
            'ar15': 'The_Devil', 'ar16': 'The_Tower', 'ar17': 'The_Star', 
            'ar18': 'The_Moon', 'ar19': 'The_Sun', 'ar20': 'Judgement', 'ar21': 'The_World'
        };
        const fileName = mapping[name] || name.charAt(0).toUpperCase() + name.slice(1);
        return `https://commons.wikimedia.org/wiki/Special:FilePath/RWS_Tarot_${fileName}.jpg`;
    },

    run: async function() {
        const btn = document.getElementById('btn');
        const resBox = document.getElementById('result');
        const loader = document.getElementById('loader');
        
        btn.disabled = true;
        resBox.style.display = 'none';
        this.UI.reset();

        try {
            // 1. 抽牌
            const tarotRes = await fetch("https://tarotapi.dev/api/v1/cards/random?n=3");
            const tarotData = await tarotRes.json();
            let info = [];

            for(let i=0; i<3; i++) {
                const card = tarotData.cards[i];
                const isRev = Math.random() > 0.5;
                
                // 更新維基百科圖片
                document.getElementById(`img${i}`).src = this.getWikiImg(card.name_short);
                
                // 執行翻牌動畫
                setTimeout(() => this.UI.flip(i, isRev), i * 300);
                info.push(`${['過去','現在','未來'][i]}位：${card.name}(${isRev?'逆位':'正位'})`);
            }

            // 2. AI 解析
            loader.style.display = 'block';
            const prompt = `你是一位專業塔羅占卜師。問題：${document.getElementById('q').value}。牌陣：${info.join('，')}。請給予一段 150 字內的繁體中文解讀。`;

            const aiRes = await fetch(`https://api-inference.huggingface.co/models/${this.MODEL}`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${this.TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ inputs: prompt, options: { wait_for_model: true } })
            });

            const data = await aiRes.json();
            const text = data[0]?.generated_text || data.generated_text || "解讀生成中，請稍後再試。";
            
            resBox.innerHTML = `<b style="color:var(--gold)">🔮 啟示：</b><br>${text.replace(prompt, "").trim()}`;
            resBox.style.display = 'block';

        } catch (err) {
            resBox.innerHTML = `<span style="color:#ff6b6b">❌ 錯誤：${err.message}</span><br><small>請確認 Token 是否正確且網路正常。</small>`;
            resBox.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }
};
</script>
</body>
</html>
