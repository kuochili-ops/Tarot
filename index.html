<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Insight Final</title>
    <style>
        :root { --gold: #f1c40f; --night: #0a0a12; }
        body { background: var(--night); color: #eee; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); max-width: 400px; margin: 0 auto 20px; }
        input { width: 80%; background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; padding: 10px; text-align: center; outline: none; margin-bottom: 15px; font-size: 1.1rem; }
        button { background: var(--gold); color: black; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; color: #888; }

        /* 翻牌模組 (Flip-board Module) */
        .spread { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .card-box { width: 100px; }
        .label { font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        .tarot-inner { width: 100px; height: 165px; position: relative; transform-style: preserve-3d; transition: 0.8s; }
        .tarot-inner.flipped { transform: rotateY(180deg); }
        .tarot-inner.reversed { transform: rotateY(180deg) rotateZ(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1.5px solid var(--gold); overflow: hidden; background: #1a1a2e; }
        .back { display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--gold); }
        .front { transform: rotateY(180deg); background: #222; }
        .front img { width: 100%; height: 100%; object-fit: cover; }

        #result { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: left; display: none; line-height: 1.8; border-left: 5px solid var(--gold); max-width: 400px; margin: 20px auto; }
        .loading { display: none; color: var(--gold); margin: 20px; font-style: italic; }
    </style>
</head>
<body>

    <h2 style="color:var(--gold)">聖三角塔羅 (正式上線)</h2>
    
    <div class="panel">
        <input type="text" id="q" placeholder="你想問什麼？" value="我今日的綜合運勢？">
        <br>
        <button id="btn" onclick="app.run()">開始占卜</button>
    </div>

    <div class="spread">
        <div class="card-box"><div class="label">過去</div><div class="tarot-inner" id="c0"><div class="face back">✦</div><div class="face front"><img id="img0"></div></div></div>
        <div class="card-box"><div class="label">現在</div><div class="tarot-inner" id="c1"><div class="face back">✦</div><div class="face front"><img id="img1"></div></div></div>
        <div class="card-box"><div class="label">未來</div><div class="tarot-inner" id="c2"><div class="face back">✦</div><div class="face front"><img id="img2"></div></div></div>
    </div>

    <div id="loader" class="loading">✨ 宇宙訊息下載中...</div>
    <div id="result"></div>

<script>
/**
 * 完整牌面名稱註解
 */
const TAROT_MAP = {
    "ar00": "愚者", "ar01": "魔術師", "ar02": "女祭司", "ar03": "皇后", "ar04": "皇帝",
    "ar05": "教皇", "ar06": "戀人", "ar07": "戰車", "ar08": "力量", "ar09": "隱士",
    "ar10": "命運之輪", "ar11": "正義", "ar12": "吊人", "ar13": "死神", "ar14": "節制",
    "ar15": "惡魔", "ar16": "高塔", "ar17": "星星", "ar18": "月亮", "ar19": "太陽",
    "ar20": "審判", "ar21": "世界"
};

const app = {
    // ⚠ 請在此填入你的 Google API Key
    API_KEY: "AIzaSyATSUCodL_2qQVtRNjDyLSLlANWlDZCDtQ",
    // 切換到正式版 v1 路徑與 flash 1.5
    API_URL: "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent",

    UI: {
        flip: (i, isRev) => {
            const el = document.getElementById(`c${i}`);
            el.className = 'tarot-inner'; 
            void el.offsetWidth;
            el.classList.add(isRev ? 'reversed' : 'flipped');
        },
        reset: () => {
            for(let i=0; i<3; i++) document.getElementById(`c${i}`).className = 'tarot-inner';
        }
    },

    run: async function() {
        const btn = document.getElementById('btn');
        const resBox = document.getElementById('result');
        const loader = document.getElementById('loader');
        
        btn.disabled = true;
        resBox.style.display = 'none';
        this.UI.reset();

        try {
            // 1. 抽牌
            const tarotRes = await fetch("https://tarotapi.dev/api/v1/cards/random?n=3");
            const data = await tarotRes.json();
            let cardNames = [];

            for(let i=0; i<3; i++) {
                const card = data.cards[i];
                const isRev = Math.random() > 0.5;
                const cnName = TAROT_MAP[card.name_short] || card.name;
                
                document.getElementById(`img${i}`).src = `https://www.sacred-texts.com/tarot/pkt/img/${card.name_short.toLowerCase()}.jpg`;
                this.UI.flip(i, isRev);
                cardNames.push(`${cnName}(${isRev?'逆位':'正位'})`);
            }

            // 2. 使用正式版 API 請求
            loader.style.display = 'block';
            const prompt = `你是一位繁體中文塔羅大師。問題：${document.getElementById('q').value}。牌陣：過去是${cardNames[0]}、現在是${cardNames[1]}、未來是${cardNames[2]}。請給予一段約 150 字的溫暖解讀。`;

            const response = await fetch(`${this.API_URL}?key=${this.API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const aiData = await response.json();

            if (aiData.error) throw new Error(`${aiData.error.status}: ${aiData.error.message}`);
            
            if (!aiData.candidates || !aiData.candidates[0].content) {
                throw new Error("宇宙連線不穩，請再點擊一次試試。");
            }

            const speech = aiData.candidates[0].content.parts[0].text;
            resBox.innerHTML = `<b style="color:var(--gold)">🔮 大師啟示：</b><br>${speech}`;
            resBox.style.display = 'block';

        } catch (err) {
            resBox.innerHTML = `<span style="color:#ff6b6b">❌ 故障排查：<br>${err.message}</span>`;
            resBox.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }
};
</script>
</body>
</html>
