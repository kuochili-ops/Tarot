<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Insight v6.0</title>
    <style>
        :root { --gold: #f1c40f; --night: #0a0a12; }
        body { background: var(--night); color: #eee; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); max-width: 420px; margin: 0 auto 20px; }
        input { width: 85%; background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; padding: 10px; text-align: center; outline: none; margin-bottom: 15px; font-size: 1.1rem; }
        button { background: var(--gold); color: black; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; color: #888; }

        /* 翻牌模組 (Flip-board Module) */
        .spread { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .card-box { width: 100px; }
        .label { font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        .tarot-inner { width: 100px; height: 160px; position: relative; transform-style: preserve-3d; transition: 0.8s; }
        .tarot-inner.flipped { transform: rotateY(180deg); }
        .tarot-inner.reversed { transform: rotateY(180deg) rotateZ(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1.5px solid var(--gold); overflow: hidden; background: #1a1a2e; }
        .back { display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--gold); }
        .front { transform: rotateY(180deg); background: #222; }
        .front img { width: 100%; height: 100%; object-fit: cover; }

        #result { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: left; display: none; line-height: 1.8; border-left: 5px solid var(--gold); max-width: 420px; margin: 20px auto; }
        .loading { display: none; color: var(--gold); margin: 20px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <h2 style="color:var(--gold)">聖三角塔羅 (最終修復)</h2>
    
    <div class="panel">
        <input type="text" id="q" placeholder="請輸入您的困惑..." value="我今日的綜合運勢？">
        <br>
        <button id="btn" onclick="app.run()">開始占卜</button>
    </div>

    <div class="spread">
        <div class="card-box"><div class="label">過去</div><div class="tarot-inner" id="c0"><div class="face back">✦</div><div class="face front"><img id="img0"></div></div></div>
        <div class="card-box"><div class="label">現在</div><div class="tarot-inner" id="c1"><div class="face back">✦</div><div class="face front"><img id="img1"></div></div></div>
        <div class="card-box"><div class="label">未來</div><div class="tarot-inner" id="c2"><div class="face back">✦</div><div class="face front"><img id="img2"></div></div></div>
    </div>

    <div class="loading" id="loader">✨ 正在連結 Hugging Face 伺服器...</div>
    <div id="result"></div>

<script>
const app = {
    // ⚠ 請在此填入正確的 Token
    TOKEN: "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",
    MODEL: "meta-llama/Llama-3.2-1B-Instruct",

    // 翻牌模組
    UI: {
        flip: (i, isRev) => {
            const el = document.getElementById(`c${i}`);
            el.classList.add(isRev ? 'reversed' : 'flipped');
        },
        reset: () => {
            for(let i=0; i<3; i++) document.getElementById(`c${i}`).className = 'tarot-inner';
        }
    },

    run: async function() {
        const btn = document.getElementById('btn');
        const resBox = document.getElementById('result');
        const loader = document.getElementById('loader');
        
        btn.disabled = true;
        resBox.style.display = 'none';
        this.UI.reset();

        try {
            // 1. 抽牌
            const tarotRes = await fetch("https://tarotapi.dev/api/v1/cards/random?n=3");
            const tarotData = await tarotRes.json();
            let info = [];

            for(let i=0; i<3; i++) {
                const card = tarotData.cards[i];
                const isRev = Math.random() > 0.5;
                
                // 更換圖源為直接 URL，減少 CORS 風險
                const cardName = card.name.replace(/ /g, "_");
                document.getElementById(`img${i}`).src = `https://www.sacred-texts.com/tarot/pkt/img/${card.name_short.toLowerCase()}.jpg`;
                
                this.UI.flip(i, isRev);
                info.push(`${['過去','現在','未來'][i]}位：${card.name}(${isRev?'逆位':'正位'})`);
            }

            // 2. AI 解析
            loader.style.display = 'block';
            
            const response = await fetch(`https://api-inference.huggingface.co/models/${this.MODEL}`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${this.TOKEN}`,
                    "Content-Type": "application/json",
                    "x-use-cache": "false" // 禁用快取強迫更新
                },
                body: JSON.stringify({ 
                    inputs: `請用繁體中文占卜。問題：${document.getElementById('q').value}。牌陣：${info.join('，')}。解讀約 100 字。`,
                    options: { wait_for_model: true }
                })
            });

            if (!response.ok) throw new Error(`API 狀態碼: ${response.status}`);

            const data = await response.json();
            const text = data[0]?.generated_text || data.generated_text || "解讀超時";
            
            resBox.innerHTML = `<b style="color:var(--gold)">🔮 大師啟示：</b><br>${text.split('解讀約 100 字。').pop().trim()}`;
            resBox.style.display = 'block';

        } catch (err) {
            resBox.innerHTML = `<span style="color:#ff6b6b">❌ 失敗：${err.message}</span><br>建議：請檢查 Token 權限是否設為 "Read"，或嘗試更換網路。`;
            resBox.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }
};
</script>
</body>
</html>
